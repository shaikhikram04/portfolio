<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ikram Kolekar — Flutter Developer crafting scalable mobile applications.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ikram Kolekar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ikram Kolekar — Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background-color: #0F1117; }

    /* Flutter web creates flt-glass-pane on top of HTML — keep it transparent
       so the body background shows through during engine initialization. */
    flt-glass-pane { background: transparent !important; }

    /* ── Splash shell ──────────────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      background-color: #0F1117;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    #splash.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── Ring ──────────────────────────────────────────────────────────── */
    .ring-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
    }

    /* Ambient teal glow that blooms once the ring is almost drawn */
    .ring-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,229,181,0.12) 0%, transparent 68%);
      opacity: 0;
      animation: fade-in 0.7s ease 0.85s forwards;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 120px;
      height: 120px;
      transform: rotate(-90deg); /* draw from 12 o'clock */
    }

    .ring-track {
      fill: none;
      stroke: #1c2333;
      stroke-width: 1.5;
    }

    /* stroke-dasharray = 2π × r = 2π × 44 ≈ 276.46 */
    .ring-arc {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 276.46;
      stroke-dashoffset: 276.46;
      animation: draw-ring 1s cubic-bezier(0.65, 0, 0.35, 1) 0.1s forwards;
    }

    @keyframes draw-ring {
      to { stroke-dashoffset: 0; }
    }

    /* ── Monogram ──────────────────────────────────────────────────────── */
    .splash-monogram {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #1AE5B5, #6C56C2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      /* cubic-bezier with slight overshoot — springs into place */
      animation: spring-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s forwards;
    }

    @keyframes spring-in {
      from { opacity: 0; transform: scale(0.65); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Name + Role ───────────────────────────────────────────────────── */
    .splash-name {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #E4E8ED;
      opacity: 0;
      animation: slide-up 0.5s ease 0.8s forwards;
    }

    .splash-role {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2.5px;
      color: #1AE5B5;
      opacity: 0;
      margin-top: -10px;
      animation: slide-up 0.5s ease 1s forwards;
    }

    /* ── Shared keyframes ──────────────────────────────────────────────── */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-content">

      <div class="ring-wrapper">
        <div class="ring-glow"></div>

        <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#1AE5B5"/>
              <stop offset="100%" stop-color="#6C56C2"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="50" cy="50" r="44"/>
          <circle class="ring-arc"   cx="50" cy="50" r="44"/>
        </svg>

        <div class="splash-monogram">IK</div>
      </div>

      <div class="splash-name">Ikram Kolekar</div>
      <div class="splash-role">Flutter Developer</div>

    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      splash.classList.add('hidden');
      setTimeout(function () { splash.remove(); }, 600);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
